<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Timer</title>
    <style>
        :root {
            --bg: #121212;
            --text: #ffffff;
            --accent-focus: #ff5f5f;
            --accent-break: #4caf50;
            --font: 'Inter', system-ui, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            transition: background-color 0.5s ease;
        }

        .container {
            text-align: center;
        }

        .modes {
            margin-bottom: 15px;
        }

        .modes button {
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 0.1rem;
            cursor: pointer;
            opacity: 0.4;
            transition: 0.3s;
            margin: 0 15px;
            padding: 5px;
        }

        .modes button:hover {
            opacity: 0.8;
        }

        .modes button.active#focusBtn {
            opacity: 1;
            color: var(--accent-focus);
            font-weight: bold;
        }

        .modes button.active#breakBtn {
            opacity: 1;
            color: var(--accent-break);
            font-weight: bold;
        }

        #timer {
            font-size: 8rem;
            font-weight: 800;
            margin-bottom: 20px;
            font-variant-numeric: tabular-nums;
        }

        .controls button {
            background: transparent;
            border: 1px solid var(--text);
            color: var(--text);
            padding: 10px 25px;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s;
            margin: 0 5px;
        }

        .controls button:hover {
            background: var(--text);
            color: var(--bg);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="modes">
            <button onclick="setMode('focus')" id="focusBtn" class="active">Focus</button>
            <button onclick="setMode('break')" id="breakBtn">Break</button>
        </div>
        <div id="timer">25:00</div>
        <div class="controls">
            <button onclick="toggleTimer()" id="startBtn">Start</button>
            <button onclick="resetTimer()">Reset</button>
        </div>
    </div>

    <script>
        const FOCUS_TIME = 25 * 60;
        const BREAK_TIME = 5 * 60;
        
        let timeLeft = FOCUS_TIME;
        let timerInterval = null;
        let isRunning = false;
        let currentMode = 'focus';

        const timerDisplay = document.getElementById('timer');
        const startBtn = document.getElementById('startBtn');
        const focusBtn = document.getElementById('focusBtn');
        const breakBtn = document.getElementById('breakBtn');

        function updateDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            timerDisplay.textContent = `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
        }

        function setMode(mode) {
            clearInterval(timerInterval);
            isRunning = false;
            currentMode = mode;
            startBtn.textContent = 'Start';

            if (mode === 'focus') {
                timeLeft = FOCUS_TIME;
                focusBtn.classList.add('active');
                breakBtn.classList.remove('active');
            } else if (mode === 'break') {
                timeLeft = BREAK_TIME;
                breakBtn.classList.add('active');
                focusBtn.classList.remove('active');
            }
            updateDisplay();
        }

        function toggleTimer() {
            if (isRunning) {
                clearInterval(timerInterval);
                startBtn.textContent = 'Start';
            } else {
                timerInterval = setInterval(() => {
                    timeLeft--;
                    updateDisplay();
                    if (timeLeft === 0) {
                        clearInterval(timerInterval);
                        isRunning = false;
                        startBtn.textContent = 'Start';
                        
                        if (currentMode === 'focus') {
                            alert("Great job! Time to take a 5-minute break.");
                            setMode('break');
                        } else {
                            alert("Break is over! Ready to focus?");
                            setMode('focus');
                        }
                    }
                }, 1000);
                startBtn.textContent = 'Pause';
            }
            isRunning = !isRunning;
        }

        function resetTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            startBtn.textContent = 'Start';
            timeLeft = currentMode === 'focus' ? FOCUS_TIME : BREAK_TIME;
            updateDisplay();
        }
    </script>
</body>
</html>
